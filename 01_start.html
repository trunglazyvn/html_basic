<!--HTML là gì: HyperText Markup Language (ngôn ngữ đánh dấu siêu văn bản)

    + nó được gọi là ngôn ngữ đánh giấu vì nó dùng các thẻ đánh dấu! <markup tags>
-->

<!doctype html>
<!--khai báo với trình duyệt đang dùng html 5 <mới nhất>-->

<html lang="en">
  <!--Thẻ root <gốc> mọi thẻ khác phải nằm trong đây-->
  <head>
    <!--Dùng để cung cấp thông tin về trang web và tải về những tài nguyên liên quan khi load trang-->

    <meta charset="UTF-8" />
    <!--UTF-8 Là bộ mã hóa kí tự quốc tế <hỗ trợ đa ngôn ngữ>-->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--name="viewport" Giúp trang web hiện thị đúng trên mọi thiết bị-->

    <title>Document</title>
    <!--Tiêu đề-->
  </head>
  <body>
    <!--Nơi chứa nội dung chính của trang-->

    <!-- Heading 1->6 -->
    <h1>THIS IS MY FIRST WEB!</h1>
    <h2>THIS IS MY FIRST WEB!</h2>
    <h3>THIS IS MY FIRST WEB!</h3>
    <h4>THIS IS MY FIRST WEB!</h4>
    <h5>THIS IS MY FIRST WEB!</h5>
    <h6>THIS IS MY FIRST WEB!</h6>

    <!-- <p> Thẻ đoạn văn -->
    <p>
      <b>HELLO WORDS!</b>
      <!-- Thẻ in đậm -->
      <i>Tôi đang học html</i>
      <!-- Thẻ in nghiêng -->
      <u>để code web</u>
      <!--Thẻ gạch chân  -->
      <b
        ><i
          ><u
            >trong hành trình trở thành 1 coder với mức lương 50 nghìn đô</u
          ></i
        ></b
      >
      <!-- Lồng thẻ -->
    </p>
  </body>
</html>
